services:
  townsquare:
    container_name: townsquare
    build:
      context: "."
      dockerfile: Dockerfile
    command: "npm run dev"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.townsquare.rule=Host(`townsquare.localhost`)"
      - "traefik.http.routers.townsquare.entrypoints=web"
    develop:
      watch:
        - action: sync
          path: .
          target: /app/townsquare
          ignore:
            - node_modules/
            - dist/
            - .git/
            - .vscode/
            - server/
        - action: sync+restart
          path: vite.config.ts
          target: /app/townsquare/vite.config.ts
        - action: rebuild
          path: package.json
        - action: rebuild
          path: package-lock.json
        - action: rebuild
          path: Dockerfile
        - action: rebuild
          path: docker-compose.yml
    environment:
      NODE_ENV: development
      VITE_SERVER_URL: ws://localhost:8081/
      # VITE_SERVER_URL: wss://live.clocktower.online:8080/
    working_dir: /app/townsquare
    networks:
      - traefik
    logging:
      driver: "json-file"
      options:
        max-size: "200k"

  ws_server:
    container_name: ws_server
    build:
      context: "."
      dockerfile: Dockerfile.server
    command: "node index.js"
    ports:
      - 8081:8081
    labels:
      - "traefik.http.routers.botc-ws.rule=Host(`ws_server.localhost`)"
      - "traefik.http.routers.botc-ws.service=botc-ws-service"
      - "traefik.http.services.botc-ws-service.loadbalancer.server.port=8081"
    develop:
      watch:
        - action: sync+restart
          path: server/
          target: /app/server
          ignore:
            - server/node_modules/
            - server/certs/
        - action: rebuild
          path: Dockerfile.server
        - action: rebuild
          path: docker-compose.yml
    environment:
      NODE_ENV: development
      ALLOWED_ORIGINS: "([^.]+\\.github\\.io|localhost|clocktower\\.online|eddbra1nprivatetownsquare\\.xyz)"
    working_dir: /app/server
    networks:
      - traefik
    logging:
      driver: "json-file"
      options:
        max-size: "200k"

networks:
  traefik:
    external: true
